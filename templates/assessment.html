
{% extends 'base.html' %}{% block content %}
<h2>Real Estate Risk Assessment</h2><form method="post"><div class="grid"><div class="card"><label>Firm Name</label><input type="text" name="client_name" required><label>Business Type</label><select name="business_type"><option>Residential Brokerage</option><option>Commercial Real Estate</option><option>Property Management</option><option>Title / Closing Support</option><option>Mixed Real Estate Operations</option></select></div><div class="card"><label>Approx. Annual Transactions</label><input type="number" name="annual_transactions" value="50" min="0"><label>Average Transaction Value ($)</label><input type="number" step="0.01" name="avg_transaction_value" value="350000" min="0"></div><div class="card"><label>Estimated Revenue per Day ($)</label><input type="number" step="0.01" name="revenue_per_day" value="15000" min="0"><label>Downtime Days of Concern</label><input type="number" name="downtime_days" value="3" min="1" max="30"></div></div>
<div class="card"><h3>Business Risk Review</h3>{% for key, category, question in questions %}<div class="question-box"><strong>{{ category }}</strong><div style="margin:6px 0 10px 0;">{{ question }}</div><div class="radio-row">{% for option in ['Strong','Moderate','Limited','Unknown'] %}<label><input type="radio" name="{{ key }}" value="{{ option }}" {% if loop.first %}checked{% endif %}> {{ option }}</label>{% endfor %}</div></div>{% endfor %}<button type="submit">Run Assessment</button></div></form>
{% endblock %}
